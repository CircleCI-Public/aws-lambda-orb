description: >
  Deploy a Lambda function using OIDC authentication.

  Deploy markers are opt-in by default: without any deploy_markers_* configuration,
  the job automatically creates and manages a full deployment lifecycle marker in the
  CircleCI Deploys UI (PLAN_AND_UPDATE mode). No extra setup required — the deploy
  will appear in the Deploys UI as soon as the job runs.

  To customise or disable deploy markers, see the update_function_with_deploy_markers example.

usage:
  version: 2.1

  orbs:
    aws-cli: circleci/aws-cli@5.1.1
    aws-lambda: circleci/aws-lambda@1.0.0

  workflows:
    deploy-lambda:
      jobs:
        - aws-lambda/update_lambda_function:
            auth:
              - aws-cli/setup:
                  role_arn: arn:aws:iam::123456789012:role/my-circleci-deploy-role
                  region: us-east-1
            source_zip_file: build/my-function.zip
            s3_bucket: my-deployment-bucket
            s3_key: my-function/<< pipeline.git.tag >>.zip
            function_name: my-lambda-function
            publish: true
